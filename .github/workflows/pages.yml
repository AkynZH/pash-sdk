name: Deploy Playground

on:
  push:
    branches: [main]

permissions:
  pages:     write
  id-token:  write
  contents:  read

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm run build
      - run: npm install @pash/prompt && node node_modules/@pash/prompt/scripts/generate-system-prompt.js
      - run: cp -r dist playground/dist

      - uses: actions/configure-pages@v4

      - uses: actions/upload-pages-artifact@v3
        with:
          path: playground

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
