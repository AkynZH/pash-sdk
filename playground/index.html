<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PASH Playground</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d1117;--bg2:#161b22;--bg3:#21262d;
  --border:#30363d;--border2:#21262d;
  --fg:#c9d1d9;--fg2:#8b949e;--fg3:#f0f6ff;
  --green:#3fb950;--blue:#58a6ff;--amber:#d29922;--red:#f85149;--purple:#a5b4fc;
  --font-mono:'JetBrains Mono','Fira Code',monospace;
  --font-sans:system-ui,-apple-system,sans-serif;
}
body{font-family:var(--font-sans);background:var(--bg);color:var(--fg);min-height:100vh;display:flex;flex-direction:column}
header{border-bottom:1px solid var(--border2);padding:12px 20px;display:flex;align-items:center;gap:12px;background:var(--bg2)}
.logo{font-family:var(--font-mono);font-size:16px;font-weight:600;color:var(--fg3)}
.ver{font-size:10px;color:var(--green);background:#0d2818;border:1px solid #1a4a2e;border-radius:4px;padding:2px 6px}
.tagline{font-size:11px;color:var(--fg2);border-left:1px solid var(--border);padding-left:12px}
.links{margin-left:auto;display:flex;gap:12px}
.links a{font-size:12px;color:var(--blue);text-decoration:none}
.tabs{display:flex;gap:2px;margin-left:auto}
.tab{background:transparent;border:1px solid transparent;border-radius:4px;padding:4px 10px;cursor:pointer;color:var(--fg2);font-family:var(--font-mono);font-size:10px;text-transform:uppercase;letter-spacing:.05em;transition:all .12s}
.tab.active{background:var(--bg2);border-color:var(--border);color:var(--fg3);font-weight:600}
main{display:grid;grid-template-columns:1fr 1fr;flex:1}
.panel{display:flex;flex-direction:column}
.panel-left{border-right:1px solid var(--border2)}
.ph{padding:7px 12px;border-bottom:1px solid var(--border2);font-size:10px;color:var(--fg2);text-transform:uppercase;letter-spacing:.05em;display:flex;justify-content:space-between;align-items:center;background:var(--bg)}
.examples{padding:8px 12px;border-bottom:1px solid var(--border2);display:flex;gap:5px;flex-wrap:wrap}
.ex{background:var(--bg2);border:1px solid var(--border);border-radius:4px;padding:3px 8px;font-size:10px;cursor:pointer;color:var(--fg2);font-family:var(--font-mono);transition:all .12s}
.ex:hover,.ex.active{background:#1f3a5f;border-color:var(--blue);color:#93c5fd}
textarea{flex:1;background:var(--bg);color:var(--green);border:none;outline:none;padding:14px;font-family:var(--font-mono);font-size:12px;resize:none;line-height:1.7;min-height:220px}
.stats{border-top:1px solid var(--border2);padding:8px 14px;display:flex;gap:16px;align-items:center;background:var(--bg2);font-size:11px}
.stat{display:flex;flex-direction:column;align-items:center;gap:1px}
.stat-l{font-size:9px;color:var(--fg2);text-transform:uppercase}
.stat-v{font-weight:600;font-size:13px}
.saving{margin-left:auto;color:var(--green);font-weight:600}
.render-area{flex:1;padding:16px;display:flex;flex-direction:column;gap:10px;overflow-y:auto}
.render-footer{border-top:1px solid var(--border2);padding:7px 14px;font-size:10px;color:var(--fg2);background:var(--bg2)}
.empty{color:#484f58;font-size:12px;font-family:var(--font-mono)}
/* UI Components */
.pash-product-card{background:var(--bg2);border:1px solid var(--border2);border-radius:8px;padding:14px;max-width:280px}
.pash-product-title{font-size:14px;font-weight:600;color:var(--fg3);margin-bottom:3px}
.pash-product-desc{font-size:11px;color:var(--fg2);margin-bottom:10px}
.pash-product-price{font-size:16px;font-weight:700;color:var(--green);display:block;margin-bottom:10px}
.pash-product-cta{background:#1f3a5f;border:1px solid var(--blue);border-radius:5px;color:var(--blue);padding:6px 14px;cursor:pointer;font-size:12px;font-weight:500}
.pash-notification{border-radius:6px;padding:10px 14px;display:flex;gap:8px;align-items:center}
.pash-notification--info{background:#051d40;border-left:3px solid var(--blue)}
.pash-notification--warn{background:#2d1f00;border-left:3px solid var(--amber)}
.pash-notification--error{background:#300a0a;border-left:3px solid var(--red)}
.pash-notification-level{font-size:10px;font-weight:700;text-transform:uppercase;min-width:36px}
.pash-notification--info .pash-notification-level{color:var(--blue)}
.pash-notification--warn .pash-notification-level{color:var(--amber)}
.pash-notification--error .pash-notification-level{color:var(--red)}
.pash-notification-message{font-size:12px;color:var(--fg)}
.pash-list{background:var(--bg2);border:1px solid var(--border2);border-radius:8px;padding:14px;max-width:260px}
.pash-list-title{font-size:10px;font-weight:500;color:var(--fg2);text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px}
.pash-list ul{padding-left:16px}.pash-list li{font-size:12px;color:var(--fg);margin-bottom:4px}
.pash-hero{background:var(--bg2);border:1px solid var(--border2);border-radius:8px;padding:20px;text-align:center;max-width:280px}
.pash-hero-headline{font-size:16px;font-weight:700;color:var(--fg3);margin-bottom:5px}
.pash-hero-sub{font-size:12px;color:var(--fg2);margin-bottom:14px}
.pash-hero-cta{background:var(--bg3);border:1px solid var(--border);border-radius:5px;color:var(--fg3);padding:8px 20px;cursor:pointer;font-size:12px;font-weight:500}
/* Doc Components */
.pash-doc-heading{color:var(--fg3);margin:4px 0}
.pash-doc-h1{font-size:20px}.pash-doc-h2{font-size:17px}.pash-doc-h3{font-size:15px}
.pash-doc-paragraph{font-size:13px;color:var(--fg);line-height:1.7;margin:2px 0}
.pash-doc-code{background:var(--bg2);border:1px solid var(--border2);border-radius:6px;padding:12px;font-size:11px;color:var(--green);overflow-x:auto;font-family:var(--font-mono)}
.pash-doc-blockquote{border-left:3px solid var(--border);padding:8px 14px;color:var(--fg2);font-style:italic}
.pash-doc-blockquote-author{font-size:11px;color:var(--fg2);margin-top:4px;display:block}
.pash-doc-image figure{background:var(--bg2);border:1px solid var(--border2);border-radius:6px;overflow:hidden}
.pash-doc-image img{max-width:100%;display:block}
.pash-doc-image-caption{font-size:11px;color:var(--fg2);padding:6px 10px;text-align:center}
.pash-doc-divider{border:none;border-top:1px solid var(--border);margin:4px 0}
.pash-doc-table-wrap{overflow-x:auto}.pash-doc-table{border-collapse:collapse;width:100%;font-size:12px}
.pash-doc-table th{border-bottom:1px solid var(--border);color:var(--fg2);padding:5px 10px;text-align:left}
.pash-doc-table td{border-bottom:1px solid var(--border2);color:var(--fg);padding:5px 10px}
.pash-doc-list ul,.pash-doc-list ol{padding-left:20px;font-size:12px;color:var(--fg)}
.pash-doc-list li{margin-bottom:3px}.pash-doc-list-title{font-size:10px;color:var(--fg2);text-transform:uppercase;margin-bottom:6px}
.pash-doc-note{border-radius:6px;padding:10px 14px}
.pash-doc-note--info{background:#051d40;border-left:3px solid var(--blue)}
.pash-doc-note--tip{background:#0d2818;border-left:3px solid var(--green)}
.pash-doc-note--warn{background:#2d1f00;border-left:3px solid var(--amber)}
.pash-doc-note--danger{background:#300a0a;border-left:3px solid var(--red)}
.pash-doc-note-level{font-size:10px;font-weight:700;text-transform:uppercase;color:var(--fg2);display:block;margin-bottom:4px}
.pash-doc-spoiler{background:var(--bg2);border:1px solid var(--border2);border-radius:6px}
.pash-doc-spoiler summary{padding:10px 14px;cursor:pointer;font-size:13px;color:var(--fg3)}
.pash-doc-spoiler-body{padding:10px 14px;font-size:12px;color:var(--fg2)}
.pash-doc-math{font-family:var(--font-mono);font-size:12px;color:var(--purple)}
.pash-doc-embed iframe{width:100%;height:200px;border:none;border-radius:6px}
.pash-unknown{border:1px solid var(--red);border-radius:5px;padding:7px 12px;font-size:11px;color:var(--red);background:#300a0a;font-family:var(--font-mono)}
</style>
</head>
<body>
<header>
  <span class="logo">PASH</span>
  <span class="ver">v1.0</span>
  <span class="tagline">Protocol for Agentic Semantic Hypermedia</span>
  <div class="links">
    <a href="https://github.com/YOUR/pash" target="_blank">GitHub</a>
    <a href="https://npmjs.com/package/pash-sdk" target="_blank">npm</a>
    <a href="../spec/pash-v1.md" target="_blank">Spec</a>
  </div>
  <div class="tabs" id="mode-tabs">
    <button class="tab active" onclick="setTab('playground')">Playground</button>
    <button class="tab" onclick="setTab('prompt')">Prompt</button>
  </div>
</header>

<main id="main">
  <!-- динамически заполняется JS -->
</main>

<script src="dist/pash.browser.js"></script>
<script>
const EXAMPLES = {
  'Карточка':    '1|Смартфон X1|AMOLED 120Hz, 256GB|69990|Купить',
  'С версией':   'v:1\n1|Планшет Pro|12" IPS, Snapdragon|49990|Заказать',
  'Несколько':   '1|Смартфон X1|AMOLED|69990|Купить\n1|Планшет Y2|12" IPS|49990|Заказать\n2|info|Доставка 1-2 дня',
  'Уведомления': '2|info|Заказ принят\n2|warn|Последний в наличии\n2|error|Нет на складе',
  'Статья':      '20|1|История интернета\n21|Всё началось в **1969** году.\n20|2|ARPANET\n22|python|import socket\n23|Пол Баран|Сеть должна выдержать **ядерный удар**\n25\n26|Год,Узлы|1969,4;1970,9;1971,14',
  'Заметки':     '29|info|Информация\n29|tip|Совет\n29|warn|Предупреждение\n29|danger|Опасность',
  'Документ':    '4|Флагман сезона|Лучший смартфон 2025|Смотреть\n20|2|Почему флагман\n21|Потому что **лучший** в своём классе\n27|Преимущества|Скорость,Камера,Батарея\n30|Технические детали|Процессор `Snapdragon 8 Gen 3`, 12 ГБ RAM',
};

let state = { tab: 'playground', example: 'Карточка', stream: EXAMPLES['Карточка'] };

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

function rtHtml(t){
  if(!t) return '';
  return esc(t)
    .replace(/\[([^\]]+)\]\(([^)]+)\)/g,'<a href="$2" style="color:var(--blue)">$1</a>')
    .replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>')
    .replace(/\*([^*]+)\*/g,'<em>$1</em>')
    .replace(/_([^_]+)_/g,'<em>$1</em>')
    .replace(/`([^`]+)`/g,'<code style="background:var(--bg3);padding:1px 5px;border-radius:3px;font-size:11px">$1</code>')
    .replace(/\n/g,'<br>');
}

function renderComp(c){
  if(!c) return '';
  if(c.type==='unknown') return `<div class="pash-unknown">⚠ Unknown ID:${c.id}</div>`;
  const f=c.fields||{};

  if(c.type==='ProductCard') return `<div class="pash-product-card"><div class="pash-product-title">${esc(f.title)}</div><div class="pash-product-desc">${esc(f.desc)}</div><span class="pash-product-price">${esc(f.price)}</span><button class="pash-product-cta">${esc(f.cta||'Купить')}</button></div>`;

  if(c.type==='Notification'){
    const lvl=['info','warn','error'].includes(f.level)?f.level:'info';
    return `<div class="pash-notification pash-notification--${lvl}"><span class="pash-notification-level">${lvl}</span><span class="pash-notification-message">${esc(f.message)}</span></div>`;
  }

  if(c.type==='List'){const items=Array.isArray(f.items)?f.items:[];return `<div class="pash-list">${f.title?`<div class="pash-list-title">${esc(f.title)}</div>`:''}<ul>${items.map(i=>`<li>${esc(i)}</li>`).join('')}</ul></div>`;}

  if(c.type==='Hero') return `<div class="pash-hero"><div class="pash-hero-headline">${esc(f.headline)}</div><div class="pash-hero-sub">${esc(f.sub)}</div><button class="pash-hero-cta">${esc(f.cta)}</button></div>`;

  if(c.type==='Heading'){const l=Math.min(Math.max(parseInt(f.level)||2,1),6);return `<h${l} class="pash-doc-heading pash-doc-h${l}">${esc(f.text)}</h${l}>`;}
  if(c.type==='Paragraph') return `<p class="pash-doc-paragraph">${rtHtml(f.text)}</p>`;
  if(c.type==='Code'){const lang=f.lang?` data-lang="${esc(f.lang)}"`:'' ;return `<pre class="pash-doc-code"${lang}><code>${esc(String(f.body||'')).replace(/\\n/g,'\n')}</code></pre>`;}
  if(c.type==='Blockquote') return `<blockquote class="pash-doc-blockquote"><p>${rtHtml(f.text)}</p>${f.author?`<cite class="pash-doc-blockquote-author">— ${esc(f.author)}</cite>`:''}</blockquote>`;
  if(c.type==='Divider') return `<hr class="pash-doc-divider">`;
  if(c.type==='Table'){const hdrs=Array.isArray(f.headers)?f.headers:[];const rows=String(f.rows||'').split(';').filter(Boolean).map(r=>r.split(','));return `<div class="pash-doc-table-wrap"><table class="pash-doc-table"><thead><tr>${hdrs.map(h=>`<th>${esc(h)}</th>`).join('')}</tr></thead><tbody>${rows.map(r=>`<tr>${r.map(c=>`<td>${esc(c)}</td>`).join('')}</tr>`).join('')}</tbody></table></div>`;}
  if(c.type==='OrderedList'){const items=Array.isArray(f.items)?f.items:[];return `<div class="pash-doc-list">${f.title?`<div class="pash-doc-list-title">${esc(f.title)}</div>`:''}<ol>${items.map(i=>`<li>${rtHtml(i)}</li>`).join('')}</ol></div>`;}
  if(c.type==='BulletList'){const items=Array.isArray(f.items)?f.items:[];return `<div class="pash-doc-list">${f.title?`<div class="pash-doc-list-title">${esc(f.title)}</div>`:''}<ul>${items.map(i=>`<li>${rtHtml(i)}</li>`).join('')}</ul></div>`;}
  if(c.type==='Note'){const lvl=['info','tip','warn','danger'].includes(f.level)?f.level:'info';return `<div class="pash-doc-note pash-doc-note--${lvl}"><span class="pash-doc-note-level">${lvl}</span><div>${rtHtml(f.text)}</div></div>`;}
  if(c.type==='Spoiler') return `<details class="pash-doc-spoiler"><summary class="pash-doc-spoiler-summary">${esc(f.title)}</summary><div class="pash-doc-spoiler-body">${rtHtml(f.body)}</div></details>`;
  if(c.type==='Math') return `<div class="pash-doc-math">${esc(f.formula)}</div>`;
  if(c.type==='Article') return `<article style="background:var(--bg2);border:1px solid var(--border2);border-radius:8px;padding:14px"><h2 style="color:var(--fg3);margin-bottom:4px">${esc(f.title)}</h2>${f.author?`<span style="font-size:11px;color:var(--fg2)">${esc(f.author)}</span>`:''}<div style="margin-top:8px;font-size:12px;color:var(--fg)">${rtHtml(f.summary)}</div></article>`;
  if(c.type==='RichBlock') return `<div style="font-size:13px;color:var(--fg);line-height:1.7">${rtHtml(f.content)}</div>`;

  return `<div class="pash-unknown">No renderer: ${c.type}</div>`;
}

function countTok(s){return Math.ceil(s.replace(/\s+/g,' ').length/4);}

function render(){
  if(state.tab==='prompt'){renderPromptTab();return;}

  const res=PASH.decodeStream(state.stream);
  const pt=countTok(state.stream);
  const ht=Math.max(45,Math.round(pt*4.5));
  const sav=Math.round((1-pt/ht)*100);

  const exBtns=Object.keys(EXAMPLES).map(k=>`<button class="ex${state.example===k?' active':''}" onclick="selectEx('${k}')">${k}</button>`).join('');
  const verBadge=res.version?`<span style="font-size:10px;color:var(--blue);background:#051d40;border:1px solid #1f6feb;border-radius:3px;padding:2px 6px;font-family:var(--font-mono)">v:${res.version}</span>`:'';
  const compsHtml=res.components.map(renderComp).join('');

  document.getElementById('main').innerHTML=`
  <div class="panel panel-left">
    <div class="examples">${exBtns}</div>
    <div class="ph"><span>PASH поток</span></div>
    <textarea id="stream-ta" spellcheck="false" oninput="updateStream(this.value)">${state.stream}</textarea>
    <div class="stats">
      <div class="stat"><span class="stat-l">PASH</span><span class="stat-v" style="color:var(--green)">${pt}</span></div>
      <div class="stat"><span class="stat-l">HTML~</span><span class="stat-v" style="color:var(--red)">${ht}</span></div>
      <span class="saving">−${sav}% vs HTML</span>
    </div>
  </div>
  <div class="panel">
    <div class="ph"><span>Rendered UI</span>${verBadge}</div>
    <div class="render-area">${compsHtml||'<span class="empty">Введите PASH поток слева...</span>'}</div>
    <div class="render-footer">${res.components.length} компонент(ов) · ${state.stream.split('\n').filter(l=>l.trim()&&!l.startsWith('v:')).length} строк</div>
  </div>`;
}

function renderPromptTab(){
  const prompt=PASH.generateSystemPrompt({lang:'ru',mode:'pash'});
  document.getElementById('main').innerHTML=`
  <div class="panel" style="grid-column:1/-1">
    <div class="ph"><span>System Prompt — RU / mode: pash</span><button onclick="copyPrompt()" style="background:var(--bg3);border:1px solid var(--border);border-radius:4px;color:var(--fg2);padding:3px 8px;cursor:pointer;font-size:10px;font-family:var(--font-mono)">Copy</button></div>
    <pre id="prompt-pre" style="flex:1;padding:16px;font-size:11px;color:var(--fg2);font-family:var(--font-mono);line-height:1.7;overflow-y:auto;white-space:pre-wrap;word-break:break-word">${esc(prompt)}</pre>
  </div>`;
}

window.setTab=function(t){
  state.tab=t;
  document.querySelectorAll('#mode-tabs .tab').forEach(b=>b.classList.remove('active'));
  document.querySelector(`#mode-tabs .tab:${t==='playground'?'first':'last'}-child`).classList.add('active');
  render();
};

window.selectEx=function(k){
  state.example=k;state.stream=EXAMPLES[k];render();
  const ta=document.getElementById('stream-ta');
  if(ta)ta.focus();
};

window.updateStream=function(v){
  state.stream=v;state.example='';
  const ta=document.getElementById('stream-ta');
  const pos=ta?ta.selectionStart:0;
  render();
  const ta2=document.getElementById('stream-ta');
  if(ta2){ta2.focus();try{ta2.setSelectionRange(pos,pos);}catch(e){}}
};

window.copyPrompt=function(){
  const pre=document.getElementById('prompt-pre');
  if(pre)navigator.clipboard.writeText(pre.textContent).then(()=>{
    const btn=document.querySelector('#main button');
    if(btn){btn.textContent='Copied!';setTimeout(()=>btn.textContent='Copy',2000);}
  });
};

render();
</script>
</body>
</html>
